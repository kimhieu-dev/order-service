version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: mnp-handover-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    command: redis-server --appendonly yes

  # UI để quản lý Redis
  redis-insight:
    image: redislabs/redisinsight:1.14.0
    container_name: redis-insight-ui

    ports:
      - "8001:8001"

    volumes:
      - redis-insight-data:/data

    depends_on:
      - redis
  zookeeper:
    container_name: mpm-handover-zookeeper
    image: wurstmeister/zookeeper
    ports:
      - 2181:2181

  kafka:
    container_name: mpm-handover-kafka
    image: wurstmeister/kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: "INSIDE://:29092,OUTSIDE://localhost:9092"
      KAFKA_LISTENERS: "INSIDE://:29092,OUTSIDE://:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
    depends_on:
      - zookeeper

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-mpm-handover-10
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"

  elasticsearch:
    container_name: mpm-handover-elasticsearch-1
    image: elasticsearch:7.10.1
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true

#  redis:
#    container_name: mpm-handover-redis
#    image: redis:6-alpine
#    ports:
#      - "6379:6379"
#    volumes:
#      - redis-data-mpm-handover:/data
#    command: redis-server --appendonly yes

volumes:
  redis-data:
  redis-insight-data:
  mongo-data:
  zookeeper-data:
  kafka-data:
  mysql-data-handover:
